<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Equipment Inventory Entry</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="card">
    <h1>Equipment Inventory Entry</h1>

    <form id="invForm">
      <label>
        Username
        <input id="username" required placeholder="e.g., diana.m" />
      </label>

      <label>
        Device Type
        <select id="deviceType" required></select>
      </label>

      <label>
        Block
        <select id="block" required></select>
      </label>

      <label>
        Floor
        <select id="floor" required></select>
      </label>

      <!-- ✅ Room is now a text input (optional) -->
      <label>
        Room (optional)
        <input id="room" placeholder="e.g., A2-03 (optional)" />
      </label>

      <!-- ✅ Serial Numbers section updated -->
      <section class="serial">
        <h3>Serial Number</h3>

        <label>
          Equipment
          <select id="equipment" required></select>
        </label>

        <label id="serialLabel">
          Serial Number
          <input id="serialInput" placeholder="Enter serial number" />
        </label>

        <p id="serialHint" class="hint"></p>
      </section>

      <label>
        Operating System
        <select id="os" required></select>
      </label>

      <label>
        Security
        <select id="security" required></select>
      </label>

      <!-- ✅ Submit button at the bottom -->
      <button type="submit" id="submitBtn">Submit</button>

      <p class="hint">
        Tip: After submit, the entry downloads as a CSV file (you can upload/commit it to GitHub).
      </p>
    </form>

    <pre id="preview" class="preview"></pre>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
