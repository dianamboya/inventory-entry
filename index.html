<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Equipment Inventory Entry</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="card">
    <h1>Ministry of Labour - ICT Equipment Inventory</h1>

    <form id="invForm">
      <label>
        Username
        <input id="username" required placeholder="e.g., user1234" />
      </label>

      <label>
        Device Type
        <select id="deviceType" required></select>
      </label>

      <!-- ✅ Printer Type (only shows when Printer is selected) -->
      <div id="printerTypeWrap" style="display:none;">
        <label>
          Printer Type
          <select id="printerType"></select>
        </label>
      </div>

      <label>
        Block
        <select id="block" required></select>
      </label>

      <label>
        Floor
        <select id="floor" required></select>
      </label>

      <label>
        Room (optional)
        <input id="room" placeholder="e.g., A2-03 (optional)" />
      </label>

      <section class="serial">
        <h3>Serial Number</h3>

        <label>
          Equipment
          <select id="equipment" required></select>
        </label>

        <label id="serialLabel">
          Serial Number
          <input id="serialInput" placeholder="Enter serial number" />
        </label>

        <p id="serialHint" class="hint"></p>
      </section>

      <label>
        Operating System
        <select id="os" required></select>
      </label>

      <label>
        Security
        <select id="security" required></select>
      </label>

      <!-- ✅ Submit button -->
      <button type="submit" id="submitBtn">Submit</button>

      <!-- ✅ Master CSV Actions -->
      <!-- <div class="actions"> -->
        <!-- <button type="button" id="downloadMasterBtn">Download Master CSV</button> -->
        <!-- <button type="button" id="clearEntriesBtn">Clear Saved Entries</button> -->
      <!-- </div> -->

      <!-- <p id="countInfo" class="hint"></p> -->

      <!-- <p class="hint">
        Tip: Submit saves entries in this browser. Use “Download Master CSV” to export all saved entries into one file.
      </p> -->
    </form>

    <pre id="preview" class="preview"></pre>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
